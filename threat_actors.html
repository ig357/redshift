<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>threat actors — redshift</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:               #0a0a0a;
      --surface:          #111111;
      --surface2:         #161616;
      --border:           #1e1e1e;
      --text:             #e8e8e8;
      --muted:            #555555;
      --accent:           #c0392b;
      --accent-dim:       rgba(192, 57, 43, 0.12);
      --accent-border:    rgba(192, 57, 43, 0.35);
      --russia:           #c0392b;
      --russia-bg:        rgba(192, 57, 43, 0.10);
      --dprk:             #7c3aed;
      --dprk-bg:          rgba(124, 58, 237, 0.10);
      --china:            #d97706;
      --china-bg:         rgba(217, 119, 6, 0.10);
      --iran:             #16a34a;
      --iran-bg:          rgba(22, 163, 74, 0.10);
      --ecrime:           #0891b2;
      --ecrime-bg:        rgba(8, 145, 178, 0.10);
      --mono: 'Courier New', monospace;
      --serif: 'Georgia', serif;
    }

    html, body { background: var(--bg); color: var(--text); font-family: var(--serif); font-size: 14px; line-height: 1.6; }

    .app { display: flex; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo { font-family: var(--mono); font-size: 1rem; letter-spacing: 0.15em; color: var(--accent); text-decoration: none; }
    nav { display: flex; gap: 1.8rem; }
    nav a { font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.1em; color: var(--muted); text-decoration: none; text-transform: lowercase; transition: color 0.15s; }
    nav a:hover, nav a.active { color: var(--text); }

    /* ── Main layout ── */
    main { flex: 1; max-width: 1200px; width: 100%; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

    /* ── Page header ── */
    .page-header { margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem; }
    .page-header-label { font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.5rem; }
    .page-header h1 { font-size: 1.5rem; font-weight: 400; color: var(--text); margin-bottom: 0.4rem; }
    .page-header .meta { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }

    /* ── Filters ── */
    .filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 2rem; align-items: center; }
    .filter-label { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; margin-right: 0.3rem; }

    .filter-btn {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 0.3rem 0.75rem;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      text-transform: lowercase;
      transition: all 0.15s;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--muted); }
    .filter-btn.active { color: var(--text); border-color: var(--text); background: var(--surface2); }
    .filter-btn[data-origin="Russia"].active    { color: var(--russia); border-color: var(--russia); background: var(--russia-bg); }
    .filter-btn[data-origin="DPRK"].active      { color: var(--dprk);   border-color: var(--dprk);   background: var(--dprk-bg); }
    .filter-btn[data-origin="China"].active     { color: var(--china);  border-color: var(--china);  background: var(--china-bg); }
    .filter-btn[data-origin="Iran"].active      { color: var(--iran);   border-color: var(--iran);   background: var(--iran-bg); }
    .filter-btn[data-origin="eCrime"].active    { color: var(--ecrime); border-color: var(--ecrime); background: var(--ecrime-bg); }

    /* ── Stats bar ── */
    .stats-bar { display: flex; gap: 2rem; margin-bottom: 2rem; padding: 1rem 1.25rem; background: var(--surface); border: 1px solid var(--border); }
    .stat { display: flex; flex-direction: column; gap: 0.2rem; }
    .stat-value { font-family: var(--mono); font-size: 1.3rem; color: var(--text); }
    .stat-label { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }

    /* ── Actor grid ── */
    .actor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1px; background: var(--border); }

    .actor-card {
      background: var(--surface);
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      transition: background 0.15s;
      cursor: default;
    }
    .actor-card:hover { background: var(--surface2); }
    .actor-card.inactive { opacity: 0.55; }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }

    .actor-name { font-size: 1rem; font-weight: 400; color: var(--text); margin-bottom: 0.2rem; }
    .actor-aliases { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); line-height: 1.6; }

    .card-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; flex-shrink: 0; }

    .origin-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      padding: 0.2rem 0.5rem;
      text-transform: uppercase;
    }
    .origin-badge.russia  { color: var(--russia); background: var(--russia-bg); border: 1px solid rgba(192,57,43,0.3); }
    .origin-badge.dprk    { color: var(--dprk);   background: var(--dprk-bg);   border: 1px solid rgba(124,58,237,0.3); }
    .origin-badge.china   { color: var(--china);  background: var(--china-bg);  border: 1px solid rgba(217,119,6,0.3); }
    .origin-badge.iran    { color: var(--iran);   background: var(--iran-bg);   border: 1px solid rgba(22,163,74,0.3); }
    .origin-badge.ecrime  { color: var(--ecrime); background: var(--ecrime-bg); border: 1px solid rgba(8,145,178,0.3); }

    .status-badge {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .status-badge.active   { color: #16a34a; }
    .status-badge.inactive { color: var(--muted); }

    .actor-description { font-size: 0.8rem; color: #999; line-height: 1.65; }

    .card-meta { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .meta-item { display: flex; flex-direction: column; gap: 0.15rem; }
    .meta-key { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    .meta-val { font-family: var(--mono); font-size: 0.72rem; color: var(--text); }

    .targets { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .target-tag {
      font-family: var(--mono);
      font-size: 0.62rem;
      padding: 0.15rem 0.4rem;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    /* ── Recent activity ── */
    .recent-activity {
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
      margin-top: 0.1rem;
    }
    .activity-header {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .activity-header::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .activity-text { font-size: 0.78rem; color: var(--text); line-height: 1.6; }

    /* ── Empty state ── */
    .empty-state { padding: 4rem 2rem; text-align: center; font-family: var(--mono); font-size: 0.8rem; color: var(--muted); }

    /* ── Footer ── */
    footer {
      padding: 1.2rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }
    footer span { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      header { padding: 0 1rem; }
      main { padding: 1.5rem 1rem 3rem; }
      .actor-grid { grid-template-columns: 1fr; }
      .stats-bar { gap: 1rem; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <a href="index.html" class="logo">redshift</a>
    <nav>
      <a href="reports.html">reports</a>
      <a href="threat_actors.html" class="active">actors</a>
    </nav>
  </header>

  <main>
    <div class="page-header">
      <div class="page-header-label">threat intelligence</div>
      <h1>Threat Actor Profiles</h1>
      <div class="meta" id="last-updated">loading...</div>
    </div>

    <div class="stats-bar" id="stats-bar">
      <div class="stat"><span class="stat-value" id="stat-total">—</span><span class="stat-label">Tracked</span></div>
      <div class="stat"><span class="stat-value" id="stat-active">—</span><span class="stat-label">Active</span></div>
      <div class="stat"><span class="stat-value" id="stat-recent">—</span><span class="stat-label">Seen this month</span></div>
      <div class="stat"><span class="stat-value" id="stat-state">—</span><span class="stat-label">Nation-state</span></div>
      <div class="stat"><span class="stat-value" id="stat-ecrime">—</span><span class="stat-label">eCrime</span></div>
    </div>

    <div class="filters">
      <span class="filter-label">filter:</span>
      <button class="filter-btn active" data-origin="all">all</button>
      <button class="filter-btn" data-origin="Russia">russia</button>
      <button class="filter-btn" data-origin="DPRK">dprk</button>
      <button class="filter-btn" data-origin="China">china</button>
      <button class="filter-btn" data-origin="Iran">iran</button>
      <button class="filter-btn" data-origin="eCrime">ecrime</button>
    </div>

    <div class="actor-grid" id="actor-grid">
      <div class="empty-state">loading profiles...</div>
    </div>
  </main>

  <footer>
    <span id="footer-count">—</span>
    <span>redshift &mdash; 2026</span>
  </footer>

</div>

<script>
  let allActors = [];
  let activeFilter = 'all';

  function originClass(origin) {
    const map = { 'Russia': 'russia', 'DPRK': 'dprk', 'China': 'china', 'Iran': 'iran', 'eCrime': 'ecrime' };
    return map[origin] || 'ecrime';
  }

  function formatDate(dateStr) {
    if (!dateStr) return 'no recent sighting';
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch { return dateStr; }
  }

  function isThisMonth(dateStr) {
    if (!dateStr) return false;
    try {
      const d = new Date(dateStr);
      const now = new Date();
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    } catch { return false; }
  }

  function renderCard(actor) {
    const cls = originClass(actor.origin);
    const hasActivity = actor.recent_activity && actor.last_seen;

    return `
      <div class="actor-card ${actor.active ? '' : 'inactive'}" data-origin="${actor.origin}">
        <div class="card-top">
          <div>
            <div class="actor-name">${actor.name}</div>
            ${actor.aliases.length ? `<div class="actor-aliases">${actor.aliases.join(' · ')}</div>` : ''}
          </div>
          <div class="card-badges">
            <span class="origin-badge ${cls}">${actor.origin}</span>
            <span class="status-badge ${actor.active ? 'active' : 'inactive'}">${actor.active ? '● active' : '○ inactive'}</span>
          </div>
        </div>

        <div class="actor-description">${actor.description}</div>

        <div class="card-meta">
          <div class="meta-item">
            <span class="meta-key">Motivation</span>
            <span class="meta-val">${actor.motivation}</span>
          </div>
          <div class="meta-item">
            <span class="meta-key">Last seen</span>
            <span class="meta-val">${formatDate(actor.last_seen)}</span>
          </div>
        </div>

        <div class="targets">
          ${actor.primary_targets.map(t => `<span class="target-tag">${t}</span>`).join('')}
        </div>

        ${hasActivity ? `
        <div class="recent-activity">
          <div class="activity-header">recent activity &mdash; ${formatDate(actor.last_seen)}</div>
          <div class="activity-text">${actor.recent_activity}</div>
        </div>` : ''}
      </div>
    `;
  }

  function renderGrid(filter) {
    const filtered = filter === 'all' ? allActors : allActors.filter(a => a.origin === filter);

    // Sort: has recent activity first, then alphabetical
    filtered.sort((a, b) => {
      if (a.last_seen && !b.last_seen) return -1;
      if (!a.last_seen && b.last_seen) return 1;
      if (a.last_seen && b.last_seen) return new Date(b.last_seen) - new Date(a.last_seen);
      return a.name.localeCompare(b.name);
    });

    const grid = document.getElementById('actor-grid');
    if (!filtered.length) {
      grid.innerHTML = '<div class="empty-state">no actors match this filter</div>';
    } else {
      grid.innerHTML = filtered.map(renderCard).join('');
    }

    document.getElementById('footer-count').textContent =
      `${filtered.length} actor${filtered.length !== 1 ? 's' : ''} displayed`;
  }

  function updateStats(actors) {
    const active = actors.filter(a => a.active).length;
    const recent = actors.filter(a => isThisMonth(a.last_seen)).length;
    const stateActors = actors.filter(a => ['Russia', 'DPRK', 'China', 'Iran'].includes(a.origin)).length;
    const ecrime = actors.filter(a => a.origin === 'eCrime').length;

    document.getElementById('stat-total').textContent  = actors.length;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-recent').textContent = recent;
    document.getElementById('stat-state').textContent  = stateActors;
    document.getElementById('stat-ecrime').textContent = ecrime;
  }

  async function loadActors() {
    try {
      const res = await fetch('threat_actors.json?v=' + Date.now());
      const data = await res.json();
      allActors = data.actors || [];

      const lastUpdated = data.last_updated
        ? new Date(data.last_updated).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' })
        : 'unknown';
      document.getElementById('last-updated').textContent = `${allActors.length} profiles · last updated ${lastUpdated}`;

      updateStats(allActors);
      renderGrid(activeFilter);
    } catch (err) {
      document.getElementById('actor-grid').innerHTML =
        '<div class="empty-state">failed to load threat actor data</div>';
    }
  }

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.origin;
      renderGrid(activeFilter);
    });
  });

  loadActors();
</script>
</body>
</html>
