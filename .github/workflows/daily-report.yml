name: Daily Threat Report

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 UTC every day
  workflow_dispatch:        # allow manual runs from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_report.py

      - name: Commit and push
        run: |
          git config user.name  "redshift-bot"
          git config user.email "bot@redshift"
          git add reports/ reports.html
          git diff --cached --quiet || git commit -m "chore: add threat report $(date +'%Y-%m-%d %H:%M')"
          git push
