<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>redshift</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e8e8;
      --muted: #777777;
      --accent: #c0392b;
      --accent-dim: #7a1a12;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 2rem 3rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: lowercase;
    }

    nav {
      display: flex;
      gap: 2rem;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      transition: color 0.2s ease;
    }

    nav a:hover {
      color: var(--text);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 3rem;
    }

    .hero {
      max-width: 640px;
      width: 100%;
    }

    .hero-label {
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .hero h1 span {
      color: var(--accent);
    }

    .hero p {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--muted);
      max-width: 480px;
      margin-bottom: 2.5rem;
    }

    .hero-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn {
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: transparent;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .btn:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .btn-ghost {
      border-color: var(--border);
      color: var(--muted);
    }

    .btn-ghost:hover {
      background: var(--surface);
      color: var(--text);
    }

    footer {
      padding: 1.5rem 3rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    footer span {
      font-family: 'Courier New', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 0.5rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (max-width: 600px) {
      header, footer {
        padding: 1.5rem;
      }

      main {
        padding: 3rem 1.5rem;
      }

      nav {
        gap: 1.2rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">redshift</div>
    <nav>
      <a href="reports.html">reports</a>
      <a href="threat_actors.html">actors</a>
    </nav>
  </header>

  <main>
    <div class="hero">
      <div class="hero-label">est. 2026</div>
      <h1>red<span>shift</span></h1>
      <p>threat intel</p>
      <div class="hero-actions">
        <a href="reports.html" class="btn">view reports</a>
        <a href="threat_actors.html" class="btn btn-ghost">view actors</a>
      </div>
    </div>
  </main>

  <footer>
    <span><span class="dot"></span>live</span>
    <span>redshift &mdash; 2026</span>
  </footer>

</body>
</html>
